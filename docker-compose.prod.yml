version: "3.9"

services:
  db:
    mem_limit: 1g
    cpu_shares: 512
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    mem_limit: 512m
    cpu_shares: 512
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - vault_keys:/run/secrets:ro
    environment:
      VAULT_KEY_DIR: /run/secrets
      VAULT_ENVELOPE_KEY_HALF: ${VAULT_ENVELOPE_KEY_HALF:?VAULT_ENVELOPE_KEY_HALF required for envelope mode}

  web:
    mem_limit: 256m
    cpu_shares: 256
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  db_data:
  vault_keys: # Vault Initialization & Master Key Management (Story 1.5) — envelope/file key halves
