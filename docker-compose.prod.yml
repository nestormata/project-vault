version: "3.9"

services:
  db:
    mem_limit: 512m
    cpu_shares: 512
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    mem_limit: 256m
    cpu_shares: 512
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    mem_limit: 128m
    cpu_shares: 256
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
  vault_keys:
