# Config for SonarCloud's Automatic Analysis (Autoscan) — this project intentionally uses
# Automatic Analysis rather than CI-based analysis (see docs/sonarqube.md for why, and for the
# CI-based alternative if that ever changes). Autoscan does NOT read sonar-project.properties;
# it only supports this specific, smaller property set, documented at
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis.
#
# Without this file, Autoscan defaults to `sonar.sources=.` — the whole repo, including the
# vendored BMAD tooling under _bmad/ (which is not this project's own code, and is the source of
# the "analyzed as compatible with all Python 3 versions" warning: _bmad/**/*.py has no Sonar
# config of its own since it was never meant to be analyzed as part of this project).

# Monorepo sources: every app/package's TS/JS source, excluding build output, generated files,
# and non-source tooling packages.
sonar.sources=apps,packages,scripts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.svelte-kit/**,**/coverage/**,**/.turbo/**,**/.stryker-tmp/**,**/reports/**,packages/db/src/migrations/**,packages/shared/openapi.json,packages/vault-action/dist/**,packages/eslint-config/**

# packages/eslint-config is excluded entirely above: it's a shared ESLint config (plain .js,
# zero .ts source files), not application logic — and its tsconfig.json extends a
# workspace-linked path (@project-vault/tsconfig/node.json) that only resolves after
# `pnpm install`, which Autoscan never runs. Excluding the package avoids Autoscan ever
# discovering that tsconfig.json and emitting a "failed to parse" warning for it.

sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

sonar.sourceEncoding=UTF-8
