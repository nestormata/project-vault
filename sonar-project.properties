sonar.organization=nestormata
sonar.projectKey=nestormata_project-vault
sonar.projectName=project-vault

sonar.sources=apps,packages,scripts
# Applied migration SQL is immutable history; exclude it rather than rewriting shipped DDL to
# satisfy non-actionable duplication findings such as plsql:S1192.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.svelte-kit/**,**/coverage/**,**/.turbo/**,**/.stryker-tmp/**,**/reports/**,**/*.d.ts,packages/db/src/migrations/**,packages/shared/openapi.json,packages/vault-action/dist/**,packages/eslint-config/**

sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

sonar.sourceEncoding=UTF-8

# Story 10.4: coverage-only exclusions. These paths remain analyzed for issues/duplication/
# hotspots (sonar.sources/sonar.exclusions above are unchanged) but are precisely excluded from
# the coverage denominator because they are test infrastructure, tooling, or a black-box
# conformance harness rather than product runtime code — see docs/sonarqube.md for the rationale
# per entry. Do NOT add product paths here to raise the metric (AC-B3), and do NOT move any of
# these into sonar.exclusions above, which would additionally hide them from issue analysis
# (AC-B2). `scripts/**` here is the root-level operator/CI tooling directory only; it does not
# match runtime `apps/api/src/scripts/**`, which stays covered.
sonar.coverage.exclusions=\
  apps/web/e2e/**,\
  scripts/**,\
  apps/api/src/__tests__/**,\
  apps/api/src/**/*-test-helpers.ts,\
  apps/api/src/**/*-test-bootstrap.ts,\
  apps/web/src/lib/test/**,\
  packages/api-contract-tests/**

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,packages/agent/coverage/lcov.info,packages/crypto/coverage/lcov.info,packages/db/coverage/lcov.info,packages/extension-api/coverage/lcov.info,packages/shared/coverage/lcov.info,packages/vault-action/coverage/lcov.info

# shell:S5332 ("clear-text protocol") on scripts/fly-setup.sh's API_BASE_URL is a false
# positive: that URL is only ever dialed over Fly.io's private 6PN network (<app>.internal),
# an encrypted WireGuard overlay on its own — the api app has no public IP and terminates no
# TLS, so https:// there would simply fail. An inline `// NOSONAR(shell:S5332)` comment was
# tried first but did not survive a full branch-analysis rescan for this rule (it's tagged
# "former-hotspot" internally and appears not to honor NOSONAR the way ordinary code-smell
# rules do) — this scanner-level ignore is the mechanism that actually works across both PR
# and branch analysis.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=shell:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=scripts/fly-setup.sh
