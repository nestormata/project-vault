sonar.organization=nestormata
sonar.projectKey=nestormata_project-vault
sonar.projectName=project-vault

sonar.sources=apps,packages
# Keep migrations excluded (same as .sonarcloud.properties): applied SQL is immutable history,
# and plsql:S1192 "define a constant" findings are not actionable without rewriting shipped DDL.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.svelte-kit/**,**/*.d.ts,packages/db/src/migrations/**

sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,packages/agent/coverage/lcov.info,packages/crypto/coverage/lcov.info,packages/db/coverage/lcov.info,packages/shared/coverage/lcov.info,packages/vault-action/coverage/lcov.info
