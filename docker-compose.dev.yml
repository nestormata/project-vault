version: "3.9"

services:
  db:
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    volumes:
      - ./apps/api/src:/app/apps/api/src
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      # Dev-only convenience: skip the bootstrap-token requirement for vault init.
      # NEVER set this in production (docker-compose.prod.yml does not set it — defaults to false).
      VAULT_ALLOW_REMOTE_INIT: 'true'
    command: ["pnpm", "dev"]

  web:
    volumes:
      - ./apps/web/src:/app/apps/web/src
    environment:
      NODE_ENV: development
