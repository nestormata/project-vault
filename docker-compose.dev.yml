version: "3.9"

services:
  db:
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    volumes:
      - ./apps/api/src:/app/apps/api/src
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    command: ["pnpm", "dev"]

  web:
    volumes:
      - ./apps/web/src:/app/apps/web/src
    environment:
      NODE_ENV: development
