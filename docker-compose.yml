services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-project_vault}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-project_vault}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  # One-shot migration runner: creates the vault_app role, RLS policies, and triggers
  # (see packages/db/src/migrations/0001_rls_and_triggers.sql) before `api` starts, so
  # `api` never has to connect as the postgres superuser (AC-1b — superuser bypasses RLS).
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-project_vault}
    command: ["pnpm", "--filter", "@project-vault/db", "db:migrate"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      # vault_app, not postgres — the postgres superuser bypasses RLS entirely (AC-1b).
      DATABASE_URL: postgresql://vault_app:dev-only-change-in-prod@db:5432/${POSTGRES_DB:-project_vault}
      API_PORT: 3000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      METRICS_BIND_HOST: 127.0.0.1
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "5173:3000"
    depends_on:
      - api

volumes:
  db_data:
