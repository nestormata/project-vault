services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-project_vault}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-project_vault}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"

  # One-shot migration runner: creates the vault_app role, RLS policies, and triggers
  # (see packages/db/src/migrations/0001_rls_and_triggers.sql) before `api` starts, so
  # `api` never has to connect as the postgres superuser (AC-1b — superuser bypasses RLS).
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-project_vault}
    command: ["pnpm", "--filter", "@project-vault/db", "db:migrate"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Vault Initialization & Master Key Management (Story 1.5):
    #   Passphrase init (dev):
    #     curl -X POST http://localhost:3000/api/v1/vault/init -H 'Content-Type: application/json' \
    #       -d '{"kmsType":"passphrase","passphrase":"your-12-char-min"}'
    #   Envelope init (prod recommended):
    #     openssl rand -hex 16  → VAULT_ENVELOPE_KEY_HALF (set in .env, not committed)
    #     openssl rand -out dev-secrets/envelope-half.bin 16
    #     curl -X POST http://localhost:3000/api/v1/vault/init -H 'Content-Type: application/json' \
    #       -d '{"kmsType":"envelope","envelopeKeyPath":"/run/secrets/envelope-half.bin","acknowledgeSplitKeyModel":true}'
    environment:
      NODE_ENV: production
      # vault_app, not postgres — the postgres superuser bypasses RLS entirely (AC-1b).
      DATABASE_URL: postgresql://vault_app:dev-only-change-in-prod@db:5432/${POSTGRES_DB:-project_vault}
      API_PORT: 3000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      METRICS_BIND_HOST: 127.0.0.1
      LOG_LEVEL: info
      VAULT_KEY_DIR: /run/secrets
      # First-init protection: set in .env or shell. Generate: openssl rand -base64 32
      VAULT_BOOTSTRAP_TOKEN: ${VAULT_BOOTSTRAP_TOKEN:-}
      # Envelope mode only: set in .env (not committed). Generate: openssl rand -hex 16
      VAULT_ENVELOPE_KEY_HALF: ${VAULT_ENVELOPE_KEY_HALF:-}
      # Encrypted Backup & Restore (Story 9.1) — opt-in; unset (the default here) disables backup
      # scheduling entirely (AC-15). To enable, set BACKUP_STORAGE_PATH or BACKUP_S3_BUCKET (not
      # both) plus BACKUP_DATABASE_URL in .env. D4: BACKUP_DATABASE_URL deliberately reuses the
      # `postgres` superuser credential above (same "superuser for whole-database operations"
      # precedent the `migrate` service already establishes) — pg_dump/pg_restore need to bypass
      # RLS, which the app's own vault_app-scoped DATABASE_URL cannot do.
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-7}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-25}
      BACKUP_STORAGE_PATH: ${BACKUP_STORAGE_PATH:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_DATABASE_URL: ${BACKUP_DATABASE_URL:-}
    volumes:
      - ./dev-secrets:/run/secrets:ro
      - backup_data:/var/backups/vault
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3000
    ports:
      - "${WEB_HOST_PORT:-5173}:3000"
    depends_on:
      - api

volumes:
  db_data:
  # Story 9.1 AC-5: default BACKUP_STORAGE_PATH destination — persists encrypted backups across
  # container restarts/recreations. Unused when BACKUP_STORAGE_PATH is unset (backup disabled) or
  # when BACKUP_S3_BUCKET is configured instead.
  backup_data:
