name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    # Derived from the postgres: service block below — keep in sync if it changes.
    env:
      SUPERUSER_DATABASE_URL: postgresql://postgres:password@localhost:5432/project_vault
      VAULT_APP_DATABASE_URL: postgresql://vault_app:dev-only-change-in-prod@localhost:5432/project_vault
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: project_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo build

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ env.SUPERUSER_DATABASE_URL }}

      - name: Run Stryker mutation tests
        run: pnpm stryker run
        env:
          # Must use vault_app, not postgres — the postgres superuser bypasses RLS
          # entirely, which would make the RLS isolation tests pass even if policies
          # were broken or missing.
          DATABASE_URL: ${{ env.VAULT_APP_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUPERUSER_DATABASE_URL }}

  flaky-test-repeat:
    name: Flaky Test Repeat Run
    runs-on: ubuntu-latest
    # The full `pnpm turbo test` suite takes ~20-25 minutes on its own (see the Quality
    # Gates job's "Test (with coverage)" step in ci.yml); 5 back-to-back runs need well
    # over 30 minutes end to end. 180 gives headroom without hitting the platform's
    # 360-minute job ceiling.
    timeout-minutes: 180
    # Rare, timing-dependent flakes (e.g. one bad run in ~6-8) are invisible to a single CI
    # run and to a single local `make ci` — a green run says nothing about a bug that only
    # shows up occasionally. Running the suite several times back-to-back turns "maybe
    # catches it" into "almost certainly catches it" before it lands on main. See the
    # register rate-limit fix and the mfa-login/mfa-enrollment cross-file investigation on
    # story 3-4 for the failures this job exists to catch early.
    env:
      SUPERUSER_DATABASE_URL: postgresql://postgres:password@localhost:5432/project_vault
      VAULT_APP_DATABASE_URL: postgresql://vault_app:dev-only-change-in-prod@localhost:5432/project_vault
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: project_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo build

      - name: Test (5x back-to-back)
        run: |
          for i in $(seq 1 5); do
            echo "=== flaky-test-repeat: run $i/5 ==="
            # Reset to a freshly-migrated, empty database before each iteration. Without this,
            # self-registration flows across the whole suite accumulate organizations/users
            # unboundedly over the 5 runs — which both breaks tests that assume a small/bounded
            # count (e.g. Story 9.2 AC-8/AC-10's org limit and slug-collision-retry checks) and
            # makes each successive run dramatically slower (observed: run1 api:test ~20min,
            # run2 ~40min, run3 ~60min against the same ever-growing database). Dropping and
            # recreating `public` (app tables) and `drizzle` (migration bookkeeping) reproduces
            # the same fresh-DB starting state every normal single CI run gets for free from its
            # own dedicated postgres service container.
            psql "$SUPERUSER_DATABASE_URL" -v ON_ERROR_STOP=1 \
              -c 'DROP SCHEMA IF EXISTS drizzle CASCADE; DROP SCHEMA IF EXISTS public CASCADE; CREATE SCHEMA public;'
            DATABASE_URL="$SUPERUSER_DATABASE_URL" pnpm db:migrate
            pnpm turbo test --force
          done
        env:
          # SUPERUSER_DATABASE_URL is already set at the job level and inherited here —
          # only the override for the test run itself (vault_app, not postgres) is needed.
          DATABASE_URL: ${{ env.VAULT_APP_DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ env.SUPERUSER_DATABASE_URL }}

  trivy-image:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t project-vault-api:nightly .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t project-vault-web:nightly .

      - name: Run Trivy scan on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: project-vault-api:nightly
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Run Trivy scan on web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: project-vault-web:nightly
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  e2e:
    name: Playwright E2E Suite
    runs-on: ubuntu-latest
    # A full browser E2E suite shares the same cost/flakiness profile as this job's siblings
    # (mutation/flaky-test-repeat/trivy-image): browser binary download, real navigation/network
    # timing, a full docker-compose stack boot — classic sources of PR-blocking flakiness unrelated
    # to a given PR's actual diff. Story 10-1 (AC-I5) deliberately runs this here, not as a
    # blocking ci.yml step; ci.yml's Quality Gates job is unmodified by this story.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Story 10-1 Dev Notes: VAULT_ALLOW_REMOTE_INIT=true is applied ONLY via
      # docker-compose.e2e.yml's override, scoped to this job — never the base docker-compose.yml
      # (that would weaken every developer's default local bootstrap-token protection).
      - name: Start the full stack (db, migrate, api, web)
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build -d

      # Mirrors scripts/docker-smoke.sh's own wait-for-ready pattern before proceeding.
      - name: Wait for API readiness
        run: |
          for i in $(seq 1 20); do
            code=0
            curl -sf http://localhost:3000/ready >/dev/null || code=$?
            [[ "$code" -eq 0 ]] && exit 0
            sleep 3
          done
          echo "API never became ready" >&2
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @project-vault/web exec playwright install --with-deps chromium

      - name: Run Playwright E2E suite
        run: pnpm --filter @project-vault/web test:e2e

      - name: Upload Playwright report + traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/e2e/test-results/
          retention-days: 30

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [mutation, flaky-test-repeat, trivy-image, e2e]
    if: failure()
    # secrets.* isn't allowed directly in step `if:` expressions, so surface it via
    # job-level env first (env.* is allowed there).
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      # Skip (not fail) when the webhook isn't configured — e.g. forks or repos that
      # haven't set up Slack yet — so an unrelated missing secret doesn't itself show
      # up as a failing job on every nightly failure.
      - name: Post to Slack
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v3
        with:
          payload: |
            {
              "text": "Nightly CI failed for ${{ github.repository }} on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Nightly CI Failed*\n*Repo:* ${{ github.repository }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
