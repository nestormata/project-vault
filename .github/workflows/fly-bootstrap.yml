name: Fly Demo Bootstrap

# One-time (or re-run-if-something-changed) provisioning, run entirely in CI so it uses
# the exact same secret values already stored in this repo (FLY_DEMO_PG_SUPERUSER_PASSWORD
# etc.) instead of requiring flyctl locally and re-typing values GitHub secrets can't hand
# back to you once set. See scripts/fly-setup.sh for what each step does.
on:
  workflow_dispatch:
    inputs:
      fly_org:
        description: Fly.io org slug (fly orgs list)
        required: true

permissions:
  contents: read

jobs:
  bootstrap:
    name: Create Fly apps, set secrets, deploy, seed
    runs-on: ubuntu-latest
    concurrency: fly-demo-deploy
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ORG: ${{ inputs.fly_org }}
      ADMIN_PG_PASSWORD: ${{ secrets.FLY_DEMO_PG_SUPERUSER_PASSWORD }}
      VAULT_APP_PASSWORD: ${{ secrets.FLY_DEMO_VAULT_APP_PASSWORD }}
      DEMO_VAULT_PASSPHRASE: ${{ secrets.FLY_DEMO_VAULT_PASSPHRASE }}
      DEMO_LOGIN_EMAIL: ${{ secrets.FLY_DEMO_LOGIN_EMAIL }}
      DEMO_LOGIN_PASSWORD: ${{ secrets.FLY_DEMO_LOGIN_PASSWORD }}
      VAULT_BOOTSTRAP_TOKEN: ${{ secrets.FLY_DEMO_VAULT_BOOTSTRAP_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # db:migrate/db:seed:demo run from source via tsx but import built output (dist/)
      # from their workspace deps.
      - name: Build shared/crypto/db packages
        run: pnpm --filter @project-vault/shared --filter @project-vault/crypto --filter @project-vault/db build

      - name: Install psql + jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client jq

      - name: Create apps, volume, secrets, deploy db
        run: ./scripts/fly-setup.sh

      - name: Deploy api
        run: flyctl deploy -c fly.api.toml -a project-vault-demo-api --ha=false --remote-only

      - name: Deploy web
        run: flyctl deploy -c fly.web.toml -a project-vault-demo-web --ha=false --remote-only

      - name: First reset (migrate + seed + vault init/unseal)
        run: ./scripts/fly-reset.sh
