name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast pre-checks: typecheck/lint/static checks plus everything that ran before the slow
  # "Test (with coverage)" step in the old single-job pipeline. Runs in parallel with the two
  # test shards below (test-api-db, test-web-other) — it does NOT gate them, since it doesn't
  # produce anything they consume. It still needs its own Postgres service: migrations,
  # check-rls, and the API contract parity tests all touch a live, migrated database.
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Derived from the postgres: service block below — keep in sync if it changes.
      SUPERUSER_DATABASE_URL: postgresql://postgres:password@localhost:5432/project_vault
      VAULT_APP_DATABASE_URL: postgresql://vault_app:dev-only-change-in-prod@localhost:5432/project_vault
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: project_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Lint
        run: pnpm turbo lint

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ env.SUPERUSER_DATABASE_URL }}

      - name: Check RLS policy coverage
        run: pnpm check-rls
        env:
          DATABASE_URL: ${{ env.VAULT_APP_DATABASE_URL }}

      - name: Check search index safety (RS-E2a)
        run: pnpm check-search-index

      - name: Check migration compatibility (AC-E9b)
        run: pnpm check-migration-compatibility

      - name: Check story status sync (retro P6-1/P7-1/P8-1)
        run: pnpm check-story-status-sync

      - name: Check PSC TBD UI deferrals tracked in deferred-work.md (retro P7-1/P8-2/P9-1)
        run: pnpm check-psc-tbd-tracking

      - name: Check extension-api version-skew (Story 14.1 AC7)
        run: pnpm check-extension-api-version-skew

      - name: Check for duplicate code
        run: pnpm jscpd

      - name: Check .trivyignore entries
        run: |
          if grep -qE "^CVE" .trivyignore 2>/dev/null; then
            TODAY=$(date +%Y-%m-%d)
            while IFS= read -r line; do
              if [[ "$line" =~ ^#\ exp:\ ([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
                EXP="${BASH_REMATCH[1]}"
                if [[ "$EXP" < "$TODAY" ]]; then
                  echo "ERROR: Expired .trivyignore entry: exp $EXP"
                  exit 1
                fi
              fi
            done < .trivyignore
          fi
          echo ".trivyignore check passed"

      - name: Check audit-ci baseline
        run: pnpm tsx scripts/check-audit-baseline.ts

      - name: Check .env.example parity
        run: pnpm tsx scripts/check-env-example.ts

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Validate commitlint (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          pnpm commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose

      - name: Generate spec and check freshness
        run: |
          pnpm generate-spec
          git diff --exit-code packages/shared/openapi.json || \
            (echo "ERROR: openapi.json is stale - run pnpm generate-spec and commit" && exit 1)

      - name: API contract parity tests (Story 9.3 D6/AC-8/AC-9/AC-10)
        run: pnpm --filter @project-vault/api-contract-tests test
        env:
          DATABASE_URL: ${{ env.VAULT_APP_DATABASE_URL }}

      - name: Check vault-action dist/ freshness (D6/AC-11)
        run: pnpm check-vault-action-dist

  # Shard 1 of 2 for the slow `pnpm turbo test` workload: apps/api + packages/db.
  # These two are kept together (not split further) because turbo.json declares an explicit
  # task dependency (`@project-vault/api#test` dependsOn `@project-vault/db#test`), and because
  # they're the only packages under test that need a live Postgres connection — packages/agent,
  # packages/crypto, packages/shared and packages/vault-action reference the literal string
  # "DATABASE_URL" only in test fixtures (parse-secrets classification), never a real connection.
  # By test-file count this shard is apps/api (228) + packages/db (40) = 268 files, vs. 212 in
  # the other shard — not exactly even, but close, and splitting apps/api's own suite further
  # would mean either two Postgres services racing against the same migrated schema or extra
  # machinery to shard within a single vitest project, which isn't worth it for this margin.
  test-api-db:
    name: Test (api + db)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SUPERUSER_DATABASE_URL: postgresql://postgres:password@localhost:5432/project_vault
      VAULT_APP_DATABASE_URL: postgresql://vault_app:dev-only-change-in-prod@localhost:5432/project_vault
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: project_vault
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm db:migrate` is a raw workspace script, not a `pnpm turbo` task, so it never
      # triggers turbo's `^build` dependency chain — `packages/db` needs
      # `@project-vault/shared`'s dist/ output to exist first (guarded-migrate.ts imports
      # it). In the old single-job pipeline this was built as a side effect of the earlier
      # `pnpm turbo typecheck` step (typecheck depends on generate-spec depends on ^build);
      # this job has no typecheck step, so it needs its own explicit build.
      - name: Build workspace packages
        run: pnpm turbo build --filter=@project-vault/api --filter=@project-vault/db

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ env.SUPERUSER_DATABASE_URL }}

      - name: Test (with coverage) - api, db
        run: pnpm turbo test --filter=@project-vault/api --filter=@project-vault/db
        env:
          # Must use vault_app, not postgres — the postgres superuser bypasses RLS
          # entirely, which would make the RLS isolation tests pass even if policies
          # were broken or missing.
          DATABASE_URL: ${{ env.VAULT_APP_DATABASE_URL }}
          # check-rls-coverage.test.ts needs superuser access to create/drop its
          # throwaway test database and manage RLS policies directly.
          ADMIN_DATABASE_URL: ${{ env.SUPERUSER_DATABASE_URL }}

      - name: Upload RLS isolation coverage (SOC2 Type II evidence)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: db-coverage-${{ github.run_id }}
          path: packages/db/coverage/
          retention-days: 90

      # Feeds the sonar job below, which needs coverage from both shards to report accurate
      # project-wide numbers. Uploaded even on failure — vitest writes LCOV to disk before
      # evaluating coverage thresholds, so a local threshold miss shouldn't blank out the
      # SonarCloud dashboard for this shard's packages.
      - name: Upload coverage for SonarCloud (api, db)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-api-db
          path: |
            apps/api/coverage/
            packages/db/coverage/
          retention-days: 1

  # Shard 2 of 2: everything under test that does NOT need a live Postgres connection. No
  # postgres service here on purpose — apps/web, packages/agent, packages/crypto,
  # packages/shared, packages/vault-action, and packages/extension-api tests never open a real DB
  # connection (verified: the only "DATABASE_URL" references in their test files are string
  # literals used as classification fixtures in packages/vault-action's parse-secrets tests). 212
  # test files vs. 268 in test-api-db — the other shard runs a bit longer, but it also carries
  # strictly more of the historically-slow work (apps/api's integration-style suite), so this is
  # the more useful place to spend the balance rather than forcing an exact 50/50 file-count split.
  test-web-other:
    name: Test (web + other packages)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (with coverage) - web, agent, crypto, shared, vault-action, extension-api
        run: >-
          pnpm turbo test --filter=@project-vault/web --filter=@project-vault/shared
          --filter=@project-vault/agent --filter=@project-vault/crypto
          --filter=@project-vault/vault-action --filter=@project-vault/extension-api

      - name: Upload coverage for SonarCloud (web, agent, crypto, shared, vault-action, extension-api)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-web-other
          path: |
            apps/web/coverage/
            packages/agent/coverage/
            packages/crypto/coverage/
            packages/shared/coverage/
            packages/vault-action/coverage/
            packages/extension-api/coverage/
          retention-days: 1

  # Combines both shards' coverage before running SonarCloud, so project-wide coverage numbers
  # reflect the whole suite rather than just one shard. `if: ${{ !cancelled() }}` at the job
  # level (not just on the individual steps) is required here: GitHub Actions skips a job's
  # `needs` dependents by default when an upstream job fails, and this job must still run — with
  # whatever partial coverage made it into the uploaded artifacts — even if a test shard failed
  # on a coverage-threshold miss, matching the old single-job behavior where a failed Test step
  # didn't block the Sonar steps that followed it.
  sonar:
    name: SonarCloud
    needs: [test-api-db, test-web-other]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download coverage (api, db)
        uses: actions/download-artifact@v7
        with:
          name: coverage-shard-api-db
          path: .

      - name: Download coverage (web, agent, crypto, shared, vault-action)
        uses: actions/download-artifact@v7
        with:
          name: coverage-shard-web-other
          path: .

      # Runs even if a test shard failed (e.g. a local coverage-threshold miss) — vitest writes
      # its full LCOV/coverage output to disk before evaluating thresholds, so the data
      # SonarCloud needs already exists in the downloaded artifacts. Only a cancelled run skips
      # this, so the dashboard always reflects the latest measured coverage instead of going
      # stale on the last passing run.
      - name: SonarCloud Scan
        if: ${{ !cancelled() }}
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarCloud Quality Gate
        if: ${{ !cancelled() }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build:
    name: Docker Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          provenance: false
          tags: project-vault-api:ci
          cache-from: type=gha,scope=api-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=api-${{ matrix.arch }}

      - name: Build web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          provenance: false
          tags: project-vault-web:ci
          cache-from: type=gha,scope=web-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=web-${{ matrix.arch }}

      # docker load only works for the host platform, so size check runs on amd64 only.
      # amd64 is the primary deployment target; arm64 build success is the validation.
      - name: Load API image for size check
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: project-vault-api:size-check
          cache-from: type=gha,scope=api-${{ matrix.arch }}

      - name: Load web image for size check
        if: matrix.arch == 'amd64'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: project-vault-web:size-check
          cache-from: type=gha,scope=web-${{ matrix.arch }}

      - name: Check image size
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          MAX_BYTES=$((300 * 1024 * 1024))
          for IMAGE in project-vault-api:size-check project-vault-web:size-check; do
            SIZE=$(docker image inspect "$IMAGE" --format='{{.Size}}')
            if [ "$SIZE" -gt "$MAX_BYTES" ]; then
              echo "FATAL: $IMAGE is ${SIZE} bytes, exceeds 300MB limit"
              exit 1
            fi
            echo "$IMAGE is ${SIZE} bytes — OK"
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
